<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Content Payment</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      margin: 0;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 22px;
      color: #333;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-top: 30px;
    }

    button {
      color: white;
      border: none;
      padding: 18px 30px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      width: 100%;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    #walletButton {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    #walletButton:hover:not(:disabled) {
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    #movistarButton {
      background: linear-gradient(135deg, #00a9e0 0%, #0077be 100%);
      box-shadow: 0 4px 15px rgba(0, 119, 190, 0.4);
    }

    #movistarButton:hover:not(:disabled) {
      box-shadow: 0 6px 20px rgba(0, 119, 190, 0.6);
    }

    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .status.info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
      display: block;
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: inline-block;
      margin-left: 10px;
      vertical-align: middle;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Thank you for your interest in accessing premium content, the cost of the content is $5 USD</h1>
    <div class="button-group">
      <button id="walletButton" onclick="payWithWallet()">Pay with Digital Wallet</button>
      <button id="movistarButton" onclick="payWithMovistar()">Pay with Movistar</button>
    </div>
    <div class="status" id="status"></div>
  </div>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const euid = urlParams.get('euid');
    const publisher = urlParams.get('publisher');

    // Generate random 6-character alphanumeric session ID
    function generateSessionId() {
      return Math.random().toString(36).substring(2, 8).toUpperCase();
    }

    const sessionId = generateSessionId();
    let pollingInterval = null;

    if (!euid) {
      alert('Error: User not identified');
      document.getElementById('walletButton').disabled = true;
      document.getElementById('movistarButton').disabled = true;
    }

    function payWithWallet() {
      alert('Connecting with a Digital Wallet');
    }

    function payWithMovistar() {
      const status = document.getElementById('status');
      const walletButton = document.getElementById('walletButton');
      const movistarButton = document.getElementById('movistarButton');

      // Disable both buttons
      walletButton.disabled = true;
      movistarButton.disabled = true;

      // Show status message
      status.className = 'status info';
      status.innerHTML = 'Waiting for SMS confirmation<span class="spinner"></span>';

      // Open SMS app with pre-filled message
      const smsBody = `OFFERW ${sessionId}`;
      const smsUrl = `sms:4141?body=${encodeURIComponent(smsBody)}`;
      window.location.href = smsUrl;

      // Start polling for status
      startPolling();
    }

    function startPolling() {
      // Poll every 3 seconds
      pollingInterval = setInterval(async () => {
        try {
          const response = await fetch(`https://awgdevelop.ddns.net/offerwall-api/status?token=${sessionId}`);
          const data = await response.json();

          if (response.ok && data.completed) {
            // Payment confirmed
            clearInterval(pollingInterval);

            // Update session with URL and vendor
            await updateSession();

            // Show success message
            const status = document.getElementById('status');
            status.className = 'status success';
            status.innerHTML = 'Payment confirmed!<br>You can now enjoy the content.';
          }
        } catch (error) {
          console.error('Polling error:', error);
        }
      }, 3000);

      // Stop polling after 5 minutes
      setTimeout(() => {
        if (pollingInterval) {
          clearInterval(pollingInterval);
          const status = document.getElementById('status');
          status.className = 'status error';
          status.innerHTML = 'Payment timeout. Please try again.';

          // Re-enable buttons
          document.getElementById('walletButton').disabled = false;
          document.getElementById('movistarButton').disabled = false;
        }
      }, 300000); // 5 minutes
    }

    async function updateSession() {
      try {
        const response = await fetch(`https://awgdevelop.ddns.net/offerwall-api/update?token=${sessionId}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            url: window.location.href,
            vendor: 'AR.MOVISTAR'
          })
        });

        const data = await response.json();
        console.log('Session updated:', data);
      } catch (error) {
        console.error('Update session error:', error);
      }
    }
  </script>
</body>

</html>
