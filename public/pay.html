<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm Payment</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      margin: 0;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 50px 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 420px;
      width: 90%;
      text-align: center;
    }

    h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 10px;
    }

    .info {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 18px 40px;
      font-size: 18px;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      width: 100%;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    button.paid {
      background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
    }

    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: inline-block;
      margin-left: 10px;
      vertical-align: middle;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Confirm Payment</h1>
    <p class="info">Click the button to confirm your subscription</p>
    <button id="payButton" onclick="confirmPayment()"> Pay </button>
    <div class="status" id="status"></div>
  </div>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const euid = urlParams.get('euid');
    const publisher = urlParams.get('publisher');

    if (!euid) {
      alert('Error: User not identified');
      document.getElementById('payButton').disabled = true;
    }

    async function confirmPayment() {
      const button = document.getElementById('payButton');
      const status = document.getElementById('status');

      // Block button immediately
      button.disabled = true;
      button.innerHTML = 'Processing<span class="spinner"></span>';
      status.style.display = 'none';

      // Call partner's endpoint
      // Expected response: { "status": "success", "euid": "...", "action": "unlocked", "timestamp": ... }
      fetch(`https://awgdevelop.ddns.net/hls/payment?euid=${encodeURIComponent(euid)}&pay=true`)
        .then(res => res.json())
        .then(data => {
          console.log('Payment response:', data);
          if (data.status === 'success' && data.action === 'unlocked') {
            console.log('Payment confirmed by partner endpoint');
          }
        })
        .catch(err => console.error('Payment endpoint error:', err));

      // Change to Paid state immediately (regardless of response)
      setTimeout(() => {
        status.className = 'status success';
        status.innerHTML = 'Payment confirmed!<br>You can now enjoy the content.';
        button.innerHTML = 'Paid';
        button.className = 'paid';
      }, 500);
    }
  </script>
</body>

</html>
