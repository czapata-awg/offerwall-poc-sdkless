<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Content Payment</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;500;600;700&family=Lora:wght@400;500;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-primary: #1a73e8;
      --color-text: #202124;
      --color-text-secondary: #5f6368;
      --color-border: #dadce0;
      --color-bg: #fff;
      --font-heading: 'Roboto Slab', serif;
      --font-body: 'Lora', serif;
    }

    body {
      font-family: var(--font-body);
      background: rgba(0, 0, 0, 0.3);
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      margin: 0;
      overflow: auto;
    }

    .container {
      background: var(--color-bg);
      border-radius: 16px;
      padding: 56px 48px;
      box-shadow:
        0 11px 15px -7px rgba(0, 0, 0, 0.2),
        0 24px 38px 3px rgba(0, 0, 0, 0.14),
        0 9px 46px 8px rgba(0, 0, 0, 0.12);
      max-width: 600px;
      width: 90vw;
      text-align: center;
    }

    h1 {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 16px;
      line-height: 1.3;
    }

    .price {
      font-family: var(--font-body);
      font-size: 1.25rem;
      font-weight: 400;
      color: var(--color-text);
      margin-bottom: 8px;
    }

    .price-note {
      font-family: var(--font-body);
      font-size: 0.875rem;
      color: var(--color-text-secondary);
      margin-bottom: 32px;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 32px;
    }

    button {
      display: block;
      width: 100%;
      background: #000;
      color: #fff;
      padding: 14px 24px;
      text-decoration: none;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, box-shadow 0.2s ease;
      font-family: var(--font-heading);
    }

    button:hover:not(:disabled) {
      background: #333;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
    }

    button:active:not(:disabled) {
      background: #555;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    button.paid {
      background: #28a745 !important;
      opacity: 1 !important;
    }

    #movistarButton {
      background: linear-gradient(135deg, #00a9e0 0%, #0077be 100%);
    }

    #movistarButton:hover:not(:disabled) {
      background: linear-gradient(135deg, #008dc7 0%, #0066a5 100%);
    }

    .status {
      margin-top: 24px;
      padding: 16px;
      border-radius: 8px;
      font-size: 1rem;
      font-family: var(--font-body);
      display: none;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .status.info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
      display: block;
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #0c5460;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      animation: spin 1s linear infinite;
      display: inline-block;
      margin-left: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .terms {
      margin-top: 24px;
      font-size: 0.9rem;
      color: var(--color-text-secondary);
      line-height: 1.5;
      font-family: var(--font-body);
    }

    .terms a {
      color: var(--color-primary);
      text-decoration: none;
      font-weight: 500;
    }

    .terms a:hover {
      text-decoration: underline;
    }

    .hidden {
      display: none !important;
    }

    .waiting-screen {
      display: none;
    }

    .waiting-screen.active {
      display: block;
    }

    .waiting-content {
      text-align: center;
    }

    .waiting-title {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 16px;
      line-height: 1.3;
    }

    .waiting-text {
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--color-text-secondary);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .btn-link {
      background: none !important;
      border: none !important;
      border-top: 1px solid var(--color-border) !important;
      color: #000 !important;
      font-size: 0.9rem !important;
      cursor: pointer;
      text-decoration: none;
      padding: 12px 0 !important;
      padding-top: 24px !important;
      display: block;
      width: 100%;
      text-align: center;
      transition: color 0.2s ease;
      font-family: var(--font-body) !important;
      font-weight: 500 !important;
      margin-top: 24px;
      border-radius: 0 !important;
      box-shadow: none !important;
    }

    .btn-link:hover {
      color: #333 !important;
      text-decoration: none;
      background: none !important;
      box-shadow: none !important;
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- Initial payment screen -->
    <div id="paymentScreen">
      <h1>Thank you for your interest in accessing premium content</h1>
      <p class="price">$5.00 USD</p>
      <p class="price-note">Includes taxes</p>
      <div class="button-group">
        <button id="walletButton" onclick="payWithWallet()">Pay with Digital Wallet</button>
        <button id="movistarButton" onclick="payWithMovistar()">Pay with Movistar</button>
        <button id="payButton" onclick="payDirect()">Pay</button>
      </div>
    </div>
    <!-- Waiting for SMS screen -->
    <div id="waitingScreen" class="waiting-screen">
      <div class="waiting-content">
        <h2 class="waiting-title">Waiting for SMS confirmation</h2>
        <p class="waiting-text" id="smsText">Please send the SMS to complete your payment</p>
        <div class="button-group" style="margin-top: 32px;" id="sendSmsButtonGroup">
          <button onclick="sendSMS()">Send SMS</button>
        </div>
        <button onclick="goBack()" class="btn-link">← Go Back</button>
      </div>
      <div class="status" id="statusSms"></div>
    </div>
    <!-- Redirecting to Digital Wallet screen -->
    <div id="walletScreen" class="waiting-screen">
      <div class="waiting-content">
        <h2 class="waiting-title">Redirecting to Digital Wallet</h2>
        <p class="waiting-text">Please wait while we connect you to your digital wallet<span class="spinner"></span></p>
        <button onclick="goBack()" class="btn-link">← Go Back</button>
      </div>
    </div>
  </div>
  <script src="pay.js"></script>
</body>

</html>
